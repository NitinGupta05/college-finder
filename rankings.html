<!DOCTYPE html>
<html lang="en" data-theme="light" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Rankings | College Finder</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/accessibility.css">
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-content">
      <a href="index.html" class="logo">🎓 CollegeFinder</a>
      <div class="nav-links">
        <a href="index.html">Browse</a>
        <a href="rankings.html" class="active" aria-current="page">Rankings</a>
        <a href="scholarships.html">Scholarships</a>
        <a href="trending.html">Trending</a>
        <a href="favorites.html">Favorites <span id="fav-count" class="badge" aria-live="polite">0</span></a>
        <button id="theme-toggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon" aria-hidden="true"></i></button>
      </div>
    </div>
  </nav>

  <main class="container single-college-page" role="main" aria-label="College rankings">
    <h1 style="margin-bottom: 30px;"><i class="fas fa-trophy" style="color: #f1c40f;"></i> College Rankings</h1>

    <div style="margin-bottom: 30px;">
      <label for="rank-category" style="margin-right: 15px; font-weight: 600;">Filter by Category:</label>
      <select id="rank-category" class="form-control" style="max-width: 300px;">
        <option value="">All Categories</option>
        <option value="Engineering">Engineering</option>
        <option value="Medical">Medical</option>
        <option value="Law">Law</option>
        <option value="Arts">Arts</option>
      </select>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px;">
      <div id="rating-board" style="grid-column: 1/-1;"></div>
    </div>

    <div style="margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
      <div class="ranking-section" style="background: var(--bg-card); padding: 20px; border-radius: 12px;">
        <h3><i class="fas fa-briefcase" style="color: #A64D79;"></i> Top by Placement</h3>
        <div id="placement-ranking"></div>
      </div>
      <div class="ranking-section" style="background: var(--bg-card); padding: 20px; border-radius: 12px;">
        <h3><i class="fas fa-star" style="color: #FFD700;"></i> Top by Rating</h3>
        <div id="rating-ranking"></div>
      </div>
      <div class="ranking-section" style="background: var(--bg-card); padding: 20px; border-radius: 12px;">
        <h3><i class="fas fa-hammer" style="color: #4CAF50;"></i> Top Infrastructure</h3>
        <div id="infrastructure-ranking"></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { colleges } from './js/data.js';
    import Storage from './js/storage.js';

    // Setup theme
    const theme = Storage.getTheme();
    document.documentElement.setAttribute('data-theme', theme);
    updateFavCount();

    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'light' ? 'dark' : 'light';
      Storage.setTheme(newTheme);
    });

    const rankCategorySelect = document.getElementById('rank-category');

    function updateFavCount() {
      const count = Storage.getFavorites().length;
      document.getElementById('fav-count').textContent = count > 0 ? count : '0';
    }

    function renderRankings() {
      const selectedCategory = rankCategorySelect.value;
      const filtered = selectedCategory ? colleges.filter(c => c.category === selectedCategory) : colleges;

      // Top 5 by different metrics
      const topByPlacement = [...filtered].sort((a, b) => b.placement - a.placement).slice(0, 5);
      const topByRating = [...filtered].sort((a, b) => b.rating - a.rating).slice(0, 5);
      const topByInfra = [...filtered].sort((a, b) => b.infrastructure - a.infrastructure).slice(0, 5);

      // Render placement
      document.getElementById('placement-ranking').innerHTML = topByPlacement.map((c, i) =>
        `<div style="padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 600;">#${i + 1} ${c.name}</span>
          <span style="background: #22c55e; color: white; padding: 4px 12px; border-radius: 20px; font-weight: 600;">${c.placement}%</span>
        </div>`
      ).join('');

      // Render rating
      document.getElementById('rating-ranking').innerHTML = topByRating.map((c, i) =>
        `<div style="padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 600;">#${i + 1} ${c.name}</span>
          <span style="color: #FFD700; font-weight: 600;">${c.rating} ⭐</span>
        </div>`
      ).join('');

      // Render infrastructure
      document.getElementById('infrastructure-ranking').innerHTML = topByInfra.map((c, i) =>
        `<div style="padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 600;">#${i + 1} ${c.name}</span>
          <span style="background: #A64D79; color: white; padding: 4px 12px; border-radius: 20px; font-weight: 600;">${c.infrastructure}/5</span>
        </div>`
      ).join('');
    }

    rankCategorySelect.addEventListener('change', renderRankings);
    renderRankings();
  </script>
</body>
</html>
