<!DOCTYPE html>
<html lang="en" data-theme="light" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Rankings | CollegeFinder</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-content">
      <a href="index.html" class="logo">CollegeFinder</a>
      <button id="nav-toggle" class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      <div class="nav-links">
        <a href="index.html">Browse</a>
        <a href="rankings.html" class="active" aria-current="page">Rankings</a>
        <a href="favorites.html">Favorites <span id="fav-count" class="badge">0</span></a>
        <a href="profile.html">Profile</a>
        <a href="about.html">About</a>
        <span id="user-chip" class="user-chip hidden">Hi, <strong id="user-chip-name"></strong></span>
        <button id="auth-button" class="btn btn-secondary btn-sm">Login</button>
        <button id="theme-toggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
      </div>
    </div>
  </nav>

  <main class="container single-college-page ranking-page" role="main" aria-label="College rankings">
    <h1 class="ranking-title"><i class="fas fa-trophy ranking-icon"></i> College Rankings</h1>
    <div class="ranking-filter-row">
      <label for="rank-category">Filter by Category:</label>
      <select id="rank-category" class="form-control">
        <option value="">All Categories</option>
        <option value="Engineering">Engineering</option>
        <option value="Medical">Medical</option>
        <option value="Law">Law</option>
        <option value="Arts">Arts</option>
      </select>
    </div>
    <div class="ranking-grid">
      <div class="ranking-section"><h3>Top by Placement</h3><div id="placement-ranking"></div></div>
      <div class="ranking-section"><h3>Top by Rating</h3><div id="rating-ranking"></div></div>
      <div class="ranking-section"><h3>Top Infrastructure</h3><div id="infrastructure-ranking"></div></div>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
