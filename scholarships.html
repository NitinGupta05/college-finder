<!DOCTYPE html>
<html lang="en" data-theme="light" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarships | College Finder</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/accessibility.css">
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-content">
      <a href="index.html" class="logo">🎓 CollegeFinder</a>
      <div class="nav-links">
        <a href="index.html">Browse</a>
        <a href="rankings.html">Rankings</a>
        <a href="scholarships.html" class="active" aria-current="page">Scholarships</a>
        <a href="trending.html">Trending</a>
        <a href="favorites.html">Favorites <span id="fav-count" class="badge" aria-live="polite">0</span></a>
        <button id="theme-toggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon" aria-hidden="true"></i></button>
      </div>
    </div>
  </nav>

  <main class="container single-college-page" role="main" aria-label="Scholarships">
    <h1 style="margin-bottom: 30px;"><i class="fas fa-graduation-cap" style="color: #A64D79;"></i> Scholarships & Financial Aid</h1>

    <div style="margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
      <div>
        <label for="scholarship-type" style="font-weight: 600; display: block; margin-bottom: 8px;">Type:</label>
        <select id="scholarship-type" class="form-control">
          <option value="">All Types</option>
          <option value="Merit-based">Merit-based</option>
          <option value="Need-based">Need-based</option>
          <option value="Category-based">Category-based</option>
          <option value="Corporate">Corporate</option>
          <option value="Sports">Sports</option>
        </select>
      </div>
    </div>

    <div id="scholarships-grid" class="grid-container"></div>
  </main>

  <script type="module">
    import { scholarships } from './js/data.js';
    import Storage from './js/storage.js';

    // Setup theme
    const theme = Storage.getTheme();
    document.documentElement.setAttribute('data-theme', theme);
    updateFavCount();

    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'light' ? 'dark' : 'light';
      Storage.setTheme(newTheme);
    });

    function updateFavCount() {
      const count = Storage.getFavorites().length;
      document.getElementById('fav-count').textContent = count > 0 ? count : '0';
    }

    const typeFilter = document.getElementById('scholarship-type');
    const grid = document.getElementById('scholarships-grid');

    function renderScholarships() {
      const selectedType = typeFilter.value;
      const filtered = selectedType ? scholarships.filter(s => s.type === selectedType) : scholarships;

      grid.innerHTML = filtered.map(s => `
        <div class="scholarship-card" style="background: var(--bg-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow);">
          <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
            <h3 style="margin: 0; font-size: 1.1rem; color: var(--text-primary);">${s.name}</h3>
            <span class="badge" style="background: var(--accent); color: white; padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; white-space: nowrap;">${s.type}</span>
          </div>
          <div style="margin-bottom: 15px;">
            <div style="margin-bottom: 10px;">
              <span style="color: var(--text-secondary); font-weight: 500;">Award Amount:</span><br>
              <span style="font-size: 1.5rem; font-weight: 700; color: var(--accent);">₹${s.amount.toLocaleString()}</span>
            </div>
            <div style="margin-bottom: 10px;">
              <span style="color: var(--text-secondary); font-weight: 500;">Eligibility:</span><br>
              <span>${s.eligibility}</span>
            </div>
            <div style="margin-bottom: 10px;">
              <span style="color: var(--text-secondary); font-weight: 500;">Available For:</span><br>
              <span>${s.link}</span>
            </div>
          </div>
          <p style="margin: 0; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px;">${s.description}</p>
          <button class="btn btn-primary" style="width: 100%;">Learn More</button>
        </div>
      `).join('');
    }

    typeFilter.addEventListener('change', renderScholarships);
    renderScholarships();
  </script>
</body>
</html>
