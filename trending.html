<!DOCTYPE html>
<html lang="en" data-theme="light" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trending Colleges | College Finder</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/accessibility.css">
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-content">
      <a href="index.html" class="logo">🎓 CollegeFinder</a>
      <div class="nav-links">
        <a href="index.html">Browse</a>
        <a href="rankings.html">Rankings</a>
        <a href="scholarships.html">Scholarships</a>
        <a href="trending.html" class="active" aria-current="page">Trending</a>
        <a href="favorites.html">Favorites <span id="fav-count" class="badge" aria-live="polite">0</span></a>
        <button id="theme-toggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon" aria-hidden="true"></i></button>
      </div>
    </div>
  </nav>

  <main class="container single-college-page" role="main" aria-label="Trending colleges">
    <h1 style="margin-bottom: 30px;"><i class="fas fa-fire" style="color: #FF6348;"></i> Trending This Month</h1>

    <section>
      <h2 style="margin-bottom: 20px; font-size: 1.5rem; color: var(--text-primary);">⭐ Featured Colleges</h2>
      <div id="featured-grid" class="grid-container"></div>
    </section>

    <section style="margin-top: 40px;">
      <h2 style="margin-bottom: 20px; font-size: 1.5rem; color: var(--text-primary);">📈 Trending Now</h2>
      <div id="trending-grid" class="grid-container"></div>
    </section>

    <section style="margin-top: 40px;">
      <h2 style="margin-bottom: 20px; font-size: 1.5rem; color: var(--text-primary);">🕒 Recently Viewed</h2>
      <div id="recently-viewed"></div>
    </section>
  </main>

  <script type="module">
    import { colleges } from './js/data.js';
    import Storage from './js/storage.js';
    import Recent from './js/recent.js';

    // Setup theme
    const theme = Storage.getTheme();
    document.documentElement.setAttribute('data-theme', theme);
    updateFavCount();

    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'light' ? 'dark' : 'light';
      Storage.setTheme(newTheme);
    });

    function updateFavCount() {
      const count = Storage.getFavorites().length;
      document.getElementById('fav-count').textContent = count > 0 ? count : '0';
    }

    function createCollegeCard(college) {
      const isFav = Storage.isFavorite(college.id);
      const placementColor = college.placement >= 90 ? '#22c55e' : college.placement >= 70 ? '#eab308' : '#ef4444';

      let badgesHTML = '<div class="card-badges">';
      if (college.isFeature) badgesHTML += '<span class="badge badge-featured">★ Featured</span>';
      if (college.isTrending) badgesHTML += '<span class="badge badge-trending">📈 Trending</span>';
      badgesHTML += `<span class="badge badge-placement" style="background-color: ${placementColor}; color: white;">${college.placement}% Placed</span>`;
      badgesHTML += '</div>';

      const card = document.createElement('div');
      card.className = 'college-card' + (college.isFeature ? ' featured-card' : '');
      card.innerHTML = `
        ${badgesHTML}
        <img src="${college.image}" alt="${college.name}" class="card-image" loading="lazy">
        <span class="category-badge">${college.category}</span>
        <div class="card-content">
          <h3 class="card-title">${college.name}</h3>
          <div class="card-stats">
            <div class="stat"><i class="fas fa-star"></i> <span>${college.rating}</span></div>
            <div class="stat"><i class="fas fa-briefcase"></i> <span>${college.placement}%</span></div>
            <div class="stat"><i class="fas fa-building"></i> <span>${college.infrastructure}</span></div>
          </div>
          <div class="card-meta">
            <span><i class="fas fa-map-marker-alt"></i> ${college.location}</span>
          </div>
          <div class="fees-display">
            <strong>₹${college.fees.toLocaleString()}</strong>/yr
          </div>
          <div class="card-actions">
            <a href="college.html?id=${college.id}" class="btn btn-primary">View</a>
            <button class="btn btn-secondary ${isFav ? 'btn-danger' : ''}" onclick="toggleFavorite(${college.id}, this)">
              <i class="fas ${isFav ? 'fa-heart-broken' : 'fa-heart'}"></i>
            </button>
          </div>
        </div>
      `;
      return card;
    }

    window.toggleFavorite = function(id, btn) {
      if (Storage.isFavorite(id)) {
        Storage.removeFavorite(id);
        btn.classList.remove('btn-danger');
      } else {
        Storage.addFavorite(id);
        btn.classList.add('btn-danger');
      }
      updateFavCount();
    };

    // Featured colleges
    const featured = colleges.filter(c => c.isFeature);
    const featuredGrid = document.getElementById('featured-grid');
    featured.forEach(c => featuredGrid.appendChild(createCollegeCard(c)));

    // Trending colleges
    const trending = colleges.filter(c => c.isTrending);
    const trendingGrid = document.getElementById('trending-grid');
    trending.forEach(c => trendingGrid.appendChild(createCollegeCard(c)));

    // Recently viewed
    const recentlyViewedContainer = document.getElementById('recently-viewed');
    const viewedIds = Recent.getViewed();
    if (viewedIds.length === 0) {
      recentlyViewedContainer.innerHTML = '<p style="color: var(--text-secondary); padding: 20px; text-align: center;">No recently viewed colleges yet.</p>';
    } else {
      const recentColleges = viewedIds.map(id => colleges.find(c => c.id === id)).filter(Boolean);
      const recentHTML = recentColleges.map((c, i) => `
        <div style="padding: 15px; background: var(--bg-card); border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);">
          <div>
            <strong>${c.name}</strong><br>
            <small style="color: var(--text-secondary);">${c.category} • ${c.location}</small>
          </div>
          <a href="college.html?id=${c.id}" class="btn btn-primary">View</a>
        </div>
      `).join('');
      recentlyViewedContainer.innerHTML = recentHTML;
    }
  </script>
</body>
</html>
