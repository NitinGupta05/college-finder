<!DOCTYPE html>
<html lang="en" data-theme="light" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | CollegeFinder</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-content">
      <a href="index.html" class="logo">CollegeFinder</a>
      <button id="nav-toggle" class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      <div class="nav-links">
        <a href="index.html">Browse</a>
        <a href="rankings.html">Rankings</a>
        <a href="favorites.html">Favorites <span id="fav-count" class="badge">0</span></a>
        <a href="profile.html" class="active" aria-current="page">Profile</a>
        <a href="about.html">About</a>
        <span id="user-chip" class="user-chip hidden">Hi, <strong id="user-chip-name"></strong></span>
        <button id="auth-button" class="btn btn-secondary btn-sm">Login</button>
        <button id="theme-toggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
      </div>
    </div>
  </nav>

  <main class="container single-college-page">
    <h1 class="page-title"><i class="fas fa-user-circle"></i> Account Dashboard</h1>

    <section class="profile-panel">
      <h2><i class="fas fa-id-card"></i> Account Information</h2>
      <div class="profile-row"><span>Full Name</span><strong id="profile-name">-</strong></div>
      <div class="profile-row"><span>Email</span><strong id="profile-email">-</strong></div>
      <div class="profile-row"><span>Member Since</span><strong id="profile-member-since">-</strong></div>
    </section>

    <div class="stats-box">
      <div class="stat-card"><i class="fas fa-heart"></i><div><h4 id="fav-count-stat">0</h4><p>Favorites Saved</p></div></div>
      <div class="stat-card"><i class="fas fa-eye"></i><div><h4 id="viewed-count">0</h4><p>Colleges Viewed</p></div></div>
      <div class="stat-card"><i class="fas fa-star"></i><div><h4 id="avg-rating">N/A</h4><p>Avg Rating</p></div></div>
    </div>

    <section class="profile-panel">
      <h2><i class="fas fa-bolt"></i> Quick Actions</h2>
      <div class="card-actions" style="flex-wrap: wrap;">
        <a class="btn btn-primary" href="index.html">Browse Colleges</a>
        <a class="btn btn-secondary" href="favorites.html">Open Favorites</a>
        <a class="btn btn-secondary" href="rankings.html">View Rankings</a>
      </div>
    </section>

    <section class="profile-panel"><h2><i class="fas fa-heart"></i> My Favorites</h2><div id="favorites-list"></div></section>
    <section class="profile-panel"><h2><i class="fas fa-history"></i> Recently Viewed</h2><div id="recently-viewed-list"></div></section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
