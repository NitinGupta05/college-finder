<!DOCTYPE html>
<html lang="en" data-theme="light" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | College Finder</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/accessibility.css">
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-content">
      <a href="index.html" class="logo">🎓 CollegeFinder</a>
      <div class="nav-links">
        <a href="index.html">Browse</a>
        <a href="rankings.html">Rankings</a>
        <a href="scholarships.html">Scholarships</a>
        <a href="trending.html">Trending</a>
        <a href="favorites.html">Favorites <span id="fav-count" class="badge" aria-live="polite">0</span></a>
        <button id="theme-toggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon" aria-hidden="true"></i></button>
      </div>
    </div>
  </nav>

  <main class="container single-college-page" role="main" aria-label="User profile">
    <h1 style="margin-bottom: 30px;"><i class="fas fa-user-circle"></i> My Profile</h1>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
      <!-- Profile Stats -->
      <div class="stats-box" style="background: var(--bg-card); padding: 20px; border-radius: 12px; border-left: 4px solid #A64D79;">
        <div class="stat-card" style="background: rgba(166, 77, 121, 0.1);">
          <i class="fas fa-heart"></i>
          <div>
            <h4 id="fav-count-stat">0</h4>
            <p>Favorites Saved</p>
          </div>
        </div>
        <div class="stat-card" style="background: rgba(166, 77, 121, 0.1);">
          <i class="fas fa-eye"></i>
          <div>
            <h4 id="viewed-count">0</h4>
            <p>Colleges Viewed</p>
          </div>
        </div>
        <div class="stat-card" style="background: rgba(166, 77, 121, 0.1);">
          <i class="fas fa-star"></i>
          <div>
            <h4 id="avg-rating">N/A</h4>
            <p>Avg Rating</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings Section -->
    <section style="margin-top: 40px; background: var(--bg-card); padding: 20px; border-radius: 12px;">
      <h2 style="margin-bottom: 20px;"><i class="fas fa-cog"></i> Settings</h2>
      <div style="margin-bottom: 20px;">
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
          <input type="checkbox" id="dark-mode-toggle">
          <span>Dark Mode</span>
        </label>
      </div>
      <button class="btn btn-primary" id="clear-data-btn" style="width: 100%;">Clear All Data</button>
    </section>

    <!-- Favorites Section -->
    <section style="margin-top: 40px;">
      <h2 style="margin-bottom: 20px;"><i class="fas fa-heart" style="color: #dc3545;"></i> My Favorites</h2>
      <div id="favorites-list"></div>
    </section>

    <!-- Recently Viewed Section -->
    <section style="margin-top: 40px;">
      <h2 style="margin-bottom: 20px;"><i class="fas fa-history"></i> Recently Viewed</h2>
      <div id="recently-viewed-list"></div>
    </section>
  </main>

  <script type="module">
    import { colleges } from './js/data.js';
    import Storage from './js/storage.js';
    import Recent from './js/recent.js';

    // Setup theme
    const theme = Storage.getTheme();
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('dark-mode-toggle').checked = theme === 'dark';
    updateProfile();

    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'light' ? 'dark' : 'light';
      Storage.setTheme(newTheme);
      document.getElementById('dark-mode-toggle').checked = newTheme === 'dark';
    });

    document.getElementById('dark-mode-toggle').addEventListener('change', (e) => {
      const newTheme = e.target.checked ? 'dark' : 'light';
      Storage.setTheme(newTheme);
    });

    function updateProfile() {
      const favIds = Storage.getFavorites();
      const viewedIds = Recent.getViewed();
      const favColleges = favIds.map(id => colleges.find(c => c.id === id)).filter(Boolean);
      const viewedColleges = viewedIds.map(id => colleges.find(c => c.id === id)).filter(Boolean);

      document.getElementById('fav-count-stat').textContent = favIds.length;
      document.getElementById('viewed-count').textContent = viewedIds.length;

      const avgRating = favColleges.length > 0
        ? (favColleges.reduce((s, c) => s + c.rating, 0) / favColleges.length).toFixed(1)
        : 'N/A';
      document.getElementById('avg-rating').textContent = avgRating;

      // Render favorites
      const favList = document.getElementById('favorites-list');
      if (favIds.length === 0) {
        favList.innerHTML = '<p style="color: var(--text-secondary); padding: 20px; text-align: center;">No favorites yet. <a href="index.html" style="color: var(--accent); text-decoration: underline;">Browse colleges</a></p>';
      } else {
        favList.innerHTML = favColleges.map(c => `
          <div style="padding: 15px; background: var(--bg-card); border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);">
            <div style="flex: 1;">
              <strong>${c.name}</strong><br>
              <small style="color: var(--text-secondary);">${c.category} • ${c.location} • ⭐ ${c.rating}</small>
            </div>
            <a href="college.html?id=${c.id}" class="btn btn-primary">View</a>
          </div>
        `).join('');
      }

      // Render recently viewed
      const viewedList = document.getElementById('recently-viewed-list');
      if (viewedIds.length === 0) {
        viewedList.innerHTML = '<p style="color: var(--text-secondary); padding: 20px; text-align: center;">No recently viewed colleges yet.</p>';
      } else {
        viewedList.innerHTML = viewedColleges.map(c => `
          <div style="padding: 15px; background: var(--bg-card); border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);">
            <div style="flex: 1;">
              <strong>${c.name}</strong><br>
              <small style="color: var(--text-secondary);">${c.category} • ${c.location}</small>
            </div>
            <a href="college.html?id=${c.id}" class="btn btn-primary">View</a>
          </div>
        `).join('');
      }
    }

    document.getElementById('clear-data-btn').addEventListener('click', () => {
      if (confirm('Are you sure? This will delete all favorites and browsing history.')) {
        Storage.clearAll();
        Recent.clear();
        updateProfile();
        alert('Data cleared successfully!');
      }
    });

    // Update on storage changes
    window.addEventListener('storage', updateProfile);
  </script>
</body>
</html>
