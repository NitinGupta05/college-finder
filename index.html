<!DOCTYPE html>
<html lang="en" data-theme="light" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Finder | Find Your Dream College</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/accessibility.css">
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-content">
      <a href="index.html" class="logo">CollegeFinder</a>
      <button id="nav-toggle" class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      <div class="nav-links">
        <a href="index.html" class="active" aria-current="page">Browse</a>
        <a href="rankings.html">Rankings</a>
        <a href="favorites.html">Favorites <span id="fav-count" class="badge" aria-live="polite">0</span></a>
        <a href="profile.html">Profile</a>
        <a href="about.html">About</a>
        <span id="user-chip" class="user-chip hidden">Hi, <strong id="user-chip-name"></strong></span>
        <button id="auth-button" class="btn btn-secondary btn-sm">Login</button>
        <button id="theme-toggle" aria-label="Toggle Dark Mode"><i class="fas fa-moon" aria-hidden="true"></i></button>
      </div>
    </div>
  </nav>

  <main class="container main-layout" role="main" aria-label="College finder main content">
    <aside id="filters-sidebar" class="sidebar" aria-label="Filters">
      <div class="filter-header">
        <h3><i class="fas fa-sliders-h"></i> Filters</h3>
        <div class="filter-tools">
          <button id="sidebar-toggle" class="btn btn-secondary btn-icon" aria-label="Collapse filters"><i class="fas fa-bars"></i></button>
          <button id="reset-filters" class="btn-text" aria-label="Reset all filters">Reset</button>
        </div>
      </div>

      <div class="filter-group">
        <label for="category-select"><i class="fas fa-layer-group"></i> Category:</label>
        <select id="category-select" class="form-control"><option value="">All Categories</option></select>
      </div>

      <div class="filter-group">
        <label for="type-select"><i class="fas fa-university"></i> Type:</label>
        <select id="type-select" class="form-control"><option value="">All Types</option></select>
      </div>

      <div class="filter-group">
        <label for="location-select"><i class="fas fa-map-marker-alt"></i> Location:</label>
        <select id="location-select" class="form-control"><option value="">All Locations</option></select>
      </div>

      <div class="filter-group">
        <label for="min-rating"><i class="fas fa-star"></i> Minimum Rating: <span id="rating-val">0</span>/5</label>
        <input type="range" id="min-rating" class="form-control" min="0" max="5" step="0.1" value="0">
      </div>

      <div class="filter-group">
        <label for="fees-range"><i class="fas fa-rupee-sign"></i> Annual Fees Range (₹):</label>
        <div class="range-inputs" role="group" aria-labelledby="fees-range">
          <input type="number" id="min-fees" placeholder="Min" class="form-control" inputmode="numeric">
          <input type="number" id="max-fees" placeholder="Max" class="form-control" inputmode="numeric">
        </div>
      </div>

      <div class="filter-group">
        <label for="min-placement"><i class="fas fa-briefcase"></i> Minimum Placement: <span id="placement-val">0</span>%</label>
        <input type="range" id="min-placement" class="form-control" min="0" max="100" step="5" value="0">
      </div>

      <div class="filter-group">
        <label for="min-infrastructure"><i class="fas fa-building"></i> Infrastructure Rating: <span id="infrastructure-val">0</span>/5</label>
        <input type="range" id="min-infrastructure" class="form-control" min="0" max="5" step="0.1" value="0">
      </div>

      <div class="filter-group">
        <label>Accreditation:</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="accreditation" value="NAAC A++"> NAAC A++</label>
          <label><input type="checkbox" name="accreditation" value="NAAC A+"> NAAC A+</label>
          <label><input type="checkbox" name="accreditation" value="NAAC A"> NAAC A</label>
          <label><input type="checkbox" name="accreditation" value="NAAC B+"> NAAC B+</label>
          <label><input type="checkbox" name="accreditation" value="NAAC B"> NAAC B</label>
        </div>
      </div>

      <div class="filter-group">
        <label>Entrance Exam:</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="entrance-exam" value="JEE Main"> JEE Main</label>
          <label><input type="checkbox" name="entrance-exam" value="NEET"> NEET</label>
          <label><input type="checkbox" name="entrance-exam" value="CLAT"> CLAT</label>
          <label><input type="checkbox" name="entrance-exam" value="Merit"> Merit</label>
          <label><input type="checkbox" name="entrance-exam" value="BITSAT"> BITSAT</label>
          <label><input type="checkbox" name="entrance-exam" value="VITEEE"> VITEEE</label>
        </div>
      </div>

      <div class="filter-group">
        <label>Facilities:</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="facilities" value="Hostel"> Hostel</label>
          <label><input type="checkbox" name="facilities" value="Lab"> Lab</label>
          <label><input type="checkbox" name="facilities" value="Library"> Library</label>
          <label><input type="checkbox" name="facilities" value="Sports"> Sports</label>
          <label><input type="checkbox" name="facilities" value="WiFi"> WiFi</label>
          <label><input type="checkbox" name="facilities" value="Cafeteria"> Cafeteria</label>
        </div>
      </div>
    </aside>

    <section class="content">
      <div class="controls-bar">
        <button id="mobile-filter-toggle" class="btn btn-secondary mobile-filter-btn" type="button" aria-label="Open filters">
          <i class="fas fa-sliders-h"></i> Filters
        </button>
        <div class="search-wrapper" role="search">
          <button id="search-trigger" class="search-trigger" type="button" aria-label="Search colleges">
            <i class="fas fa-search search-icon" aria-hidden="true"></i>
          </button>
          <input type="search" id="search-input" placeholder="Search colleges by name..." aria-controls="search-suggestions">
          <div id="search-suggestions" class="suggestions-dropdown"></div>
        </div>
        <div id="sort-pills" class="sort-pills" role="tablist" aria-label="Sort colleges">
          <button type="button" class="sort-pill active" data-sort="rating" role="tab" aria-selected="true">Rating</button>
          <button type="button" class="sort-pill" data-sort="placement" role="tab" aria-selected="false">Placement</button>
          <button type="button" class="sort-pill" data-sort="fees" role="tab" aria-selected="false">Fees</button>
        </div>
        <input id="sort-select" type="hidden" value="rating">
      </div>

      <div id="recent-section" class="section hidden">
        <h4>Recently Viewed</h4>
        <div class="horizontal-scroll" id="recent-container"></div>
      </div>

      <div id="colleges-grid" class="grid-container" aria-live="polite"></div>
      <div class="load-more-container"><button id="load-more" class="btn btn-primary">Load More</button></div>
    </section>
  </main>

  <div id="compare-modal" class="modal">
    <div class="modal-content large-modal">
      <div class="modal-header">
        <h2>Compare Colleges</h2>
        <button class="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <table class="compare-table">
          <thead><tr><th>College</th><th>Location</th><th>Fees</th><th>Rating</th><th>Type</th><th>Action</th></tr></thead>
          <tbody id="compare-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
